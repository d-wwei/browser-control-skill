name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install pytest

      - name: Install Node dependencies
        run: npm install

      - name: Run Python CDP helper tests
        run: python3 -m pytest tests/test_cdp_helper.py -v

      - name: Run safety tests
        run: node --test tests/test_safety.mjs

      - name: Run DOM-to-Markdown tests
        run: node --test tests/test_dom_to_markdown.mjs

      - name: Run shell tests
        run: bash tests/test_scripts.sh

  integration-tests:
    name: Integration Tests (non-blocking)
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm install

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start Chrome headless with remote debugging
        run: |
          google-chrome \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --remote-debugging-port=9222 \
            --remote-debugging-address=127.0.0.1 &
          # Wait for Chrome to be ready (retry up to 15 seconds)
          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              echo "Chrome ready after ${i}s"
              curl -s http://127.0.0.1:9222/json/version
              break
            fi
            sleep 1
          done
          curl -s http://127.0.0.1:9222/json/version || (echo "Chrome failed to start after 15s" && exit 1)

      - name: Start CDP Proxy
        run: |
          node skills/browser-control/scripts/cdp-proxy.mjs > /tmp/cdp-proxy.log 2>&1 &
          # Wait for proxy to connect to Chrome
          for i in $(seq 1 10); do
            if curl -s http://localhost:3456/health 2>/dev/null | grep -q "ok"; then
              echo "Proxy ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:3456/health || echo "Proxy health check failed"
          curl -s http://localhost:3456/targets || echo "Proxy targets check failed"

      - name: Run integration tests
        run: bash tests/test_integration.sh

      - name: Show proxy logs on failure
        if: failure()
        run: cat /tmp/cdp-proxy.log 2>/dev/null || echo "No proxy log"
